<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ company_name }} Focus | GradVox</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020617;
      --card-bg: rgba(15, 23, 42, 0.6);
      --primary: #00f7ff;
      --secondary: #8b5cf6;
      --accent: #ffd700;
      --text: #f8fafc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Ambient Background */
    .bg-dots {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(0, 247, 255, 0.1) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: -1;
    }

    /* Main Container */
    .page-container {
      width: 100%;
      max-width: 900px;
      padding: 60px 20px 80px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .nav-top {
      margin-bottom: 40px;
    }

    .btn-back {
      text-decoration: none;
      color: var(--primary);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 30px;
      background: rgba(0, 247, 255, 0.05);
      border: 1px solid rgba(0, 247, 255, 0.2);
      transition: 0.3s;
    }

    .btn-back:hover {
      background: rgba(0, 247, 255, 0.15);
      box-shadow: 0 0 20px rgba(0, 247, 255, 0.2);
    }

    /* Hero Section */
    .company-hero {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      padding: 50px;
      display: flex;
      align-items: center;
      gap: 40px;
      margin-bottom: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .logo-wrap {
      background: white;
      padding: 20px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 140px;
      height: 140px;
      flex-shrink: 0;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .company-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .hero-text h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      margin-bottom: 12px;
      color: white;
    }

    .hero-text p {
      color: #94a3b8;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    /* Skills Grid */
    .skills-title {
      font-size: 1.5rem;
      margin-bottom: 24px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .skill-chip {
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      padding: 18px 24px;
      border-radius: 16px;
      font-weight: 600;
      color: #c7d2fe;
      text-align: center;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .skill-chip:hover {
      background: var(--secondary);
      color: white;
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
      border-color: var(--secondary);
    }

    .skill-chip::before {
      content: "✦";
      color: var(--primary);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .company-hero {
        flex-direction: column;
        text-align: center;
        padding: 40px 30px;
      }
      .logo-wrap { width: 120px; height: 120px; }
      .skills-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="bg-dots"></div>

  <div class="page-container">
    <div class="nav-top">
      <a href="/company_prep" class="btn-back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back to Companies
      </a>
    </div>

    <div class="company-hero">
      <div class="logo-wrap">
        <img src="{{ logo }}" class="company-logo" alt="{{ company_name }}">
      </div>
      <div class="hero-text">
        <h1>{{ company_name }}</h1>
        <p>Expert-curated curriculum specifically designed for the {{ company_name }} recruitment lifecycle. Focus on these high-probability domains.</p>
      </div>
    </div>

    <h2 class="skills-title"><span>🎯</span> Critical Focus Skills</h2>
    <div class="skills-grid">
      {% for skill in company_skills %}
      <div class="skill-chip">{{ skill }}</div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
