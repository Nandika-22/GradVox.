<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Buddy | GradVox</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Fredoka:wght@400;600&display=swap"
    rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --primary: #38bdf8;
      --secondary: #8b5cf6;
      --accent: #fbbf24;
      --text: #f8fafc;
      --glass: rgba(255, 255, 255, 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* Lava-Lamp Ambient Background */
    .lava-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: #020617;
    }

    .blob {
      position: absolute;
      width: 450px;
      height: 450px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.2;
      animation: drift 20s infinite alternate ease-in-out;
    }

    .blob-1 {
      background: var(--primary);
      top: -10%;
      left: -5%;
    }

    .blob-2 {
      background: var(--secondary);
      bottom: -10%;
      right: -5%;
      animation-delay: -5s;
    }

    @keyframes drift {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(60px, 60px) scale(1.1);
      }
    }

    /* Premium Glass Sidebar */
    .sidebar {
      width: 320px;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(25px);
      border-right: 2px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      padding: 40px 25px;
      z-index: 100;
      transition: 0.4s;
    }

    .brand-group {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 50px;
    }

    .avatar-mini {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid var(--primary);
      background: white;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .history-title {
      font-size: 11px;
      font-weight: 800;
      color: #64748b;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    .history-item {
      padding: 15px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 12px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: 0.3s;
    }

    .history-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: white;
      border-color: rgba(56, 189, 248, 0.2);
    }

    /* Main Chat Arena */
    .chat-arena {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .chat-header {
      padding: 25px 40px;
      background: rgba(15, 23, 42, 0.2);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 800;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 25px;
      scroll-behavior: smooth;
    }

    /* Message Bubbles (V3 Style) */
    .message {
      max-width: 75%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      animation: bubblePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes bubblePop {
      from {
        transform: scale(0.8);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .bot {
      align-self: flex-start;
    }

    .user {
      align-self: flex-end;
    }

    .bubble {
      padding: 18px 25px;
      border-radius: 30px;
      font-size: 1rem;
      line-height: 1.6;
      font-weight: 500;
      position: relative;
    }

    .bot .bubble {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 2px solid rgba(255, 255, 255, 0.05);
      color: #e2e8f0;
      border-bottom-left-radius: 8px;
    }

    .user .bubble {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border-bottom-right-radius: 8px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    /* Tactical Multi-Action Row */
    .action-row {
      display: flex;
      gap: 12px;
      padding: 0 10px;
    }

    .mini-btn {
      background: rgba(255, 255, 255, 0.05);
      border: none;
      color: #94a3b8;
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
    }

    .mini-btn:hover {
      background: var(--primary);
      color: var(--bg);
      transform: translateY(-2px);
    }

    .mini-btn.playing {
      background: #ef4444;
      color: white;
    }

    /* Input Dock (The Squishy Dock) */
    .input-dock {
      padding: 30px 40px 40px;
    }

    .dock-inner {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border-radius: 35px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      padding: 10px 15px;
      gap: 15px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
    }

    input {
      flex: 1;
      background: none;
      border: none;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      outline: none;
      padding-left: 10px;
    }

    .btn-circle {
      width: 50px;
      height: 50px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
      font-size: 1.2rem;
    }

    .btn-circle:hover {
      transform: scale(1.1) rotate(5deg);
      box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
    }

    .btn-mic {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #64748b;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-mic:hover {
      color: var(--primary);
      background: rgba(56, 189, 248, 0.1);
    }

    .btn-mic.listening {
      animation: pulseMic 1s infinite alternate;
      color: #ef4444;
    }

    @keyframes pulseMic {
      from {
        transform: scale(1);
      }

      to {
        transform: scale(1.2);
      }
    }

    /* Scrollbar */
    .chat-box::-webkit-scrollbar {
      width: 6px;
    }

    .chat-box::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    @media (max-width: 900px) {
      .sidebar {
        display: none;
      }
    }

    @media (max-width: 600px) {
      .chat-header {
        padding: 15px 20px;
      }
      .chat-box {
        padding: 20px 15px;
        gap: 20px;
      }
      .message {
        max-width: 90%;
      }
      .bubble {
        padding: 14px 18px;
        font-size: 0.95rem;
      }
      .input-dock {
        padding: 15px;
        position: sticky;
        bottom: 0;
        background: var(--bg);
      }
      .dock-inner {
        padding: 5px 10px;
        border-radius: 25px;
      }
      input {
        font-size: 1rem;
      }
      .btn-circle {
        width: 40px;
        height: 40px;
        border-radius: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="lava-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <aside class="sidebar">
    <div class="brand-group">
      <img src="/static/avatar2.png" class="avatar-mini" alt="AI">
      <div>
        <h3 style="font-family: 'Fredoka'; font-size: 1.3rem;">AI Buddy</h3>
        <p style="font-size: 10px; color: var(--primary); font-weight: 800;">INTERVIEW SYNC ON</p>
      </div>
    </div>

    <h4 class="history-title">RECENT QUERIES</h4>
    <div class="history-item">How to prepare for Apple?</div>
    <div class="history-item">Explain Dijkstra's Algorithm</div>
    <div class="history-item">Top Behavioral Tips</div>

    <div style="margin-top: auto;">
      <a href="/dashboard"
        style="text-decoration: none; font-weight: 800; color: #64748b; font-size: 12px; display: flex; align-items: center; gap: 8px;">
        <i class="fas fa-arrow-left"></i> COMMAND CENTER
      </a>
    </div>
  </aside>

  <main class="chat-arena">
    <header class="chat-header">
      <h3 style="font-family: 'Fredoka'">Cognitive Interface</h3>
      <div class="status-badge">
        <i class="fas fa-circle" style="font-size: 6px;"></i> SYSTEM ONLINE
      </div>
    </header>

    <div class="chat-box" id="chatBox">
      <!-- Welcome Message -->
      <div class="message bot">
        <div class="bubble">
          Greetings! I am your AI Career Buddy. High-intelligence mode is active. How can I facilitate your professional
          growth today? 🚀
        </div>
        <div class="action-row">
          <button class="mini-btn spk-btn"
            onclick="toggleSpeak(this, 'Greetings! I am your AI career buddy. High intelligence mode is active. How can I facilitate your professional growth today?')">
            <i class="fas fa-play"></i> Play
          </button>
          <button class="mini-btn" onclick="copyText(this)">
            <i class="fas fa-copy"></i> Copy
          </button>
        </div>
      </div>
    </div>

    <div class="input-dock">
      <div class="dock-inner">
        <button class="btn-mic" id="micBtn" onclick="startSpeechRecognition()"><i
            class="fas fa-microphone"></i></button>
        <input type="text" id="userInput" placeholder="Synthesize query..." autocomplete="off">
        <button class="btn-circle" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </main>

  <!-- Voice Implementation -->
  <script>
    let currentUtt = null;
    let currentBtn = null;

    function toggleSpeak(btn, text) {
      if (window.speechSynthesis.speaking && currentBtn === btn) {
        window.speechSynthesis.cancel();
        btn.innerHTML = '<i class="fas fa-play"></i> Play';
        btn.classList.remove('playing');
        currentBtn = null;
        return;
      }

      window.speechSynthesis.cancel();
      if (currentBtn) {
        currentBtn.innerHTML = '<i class="fas fa-play"></i> Play';
        currentBtn.classList.remove('playing');
      }

      btn.innerHTML = '<i class="fas fa-stop"></i> Stop';
      btn.classList.add('playing');
      currentBtn = btn;

      const utt = new SpeechSynthesisUtterance(text);
      utt.onend = () => {
        btn.innerHTML = '<i class="fas fa-play"></i> Play';
        btn.classList.remove('playing');
        currentBtn = null;
      };
      window.speechSynthesis.speak(utt);
    }

    function copyText(btn) {
      const bubble = btn.closest('.message').querySelector('.bubble').textContent;
      navigator.clipboard.writeText(bubble.trim());
      const oldHtml = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-check"></i> Copied';
      setTimeout(() => btn.innerHTML = oldHtml, 2000);
    }

    function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      const box = document.getElementById('chatBox');
      box.insertAdjacentHTML('beforeend', `<div class="message user"><div class="bubble">${text}</div></div>`);
      input.value = "";
      box.scrollTop = box.scrollHeight;

      // Bot Loading
      const botId = 'bot-' + Date.now();
      box.insertAdjacentHTML('beforeend', `
        <div class="message bot" id="${botId}">
          <div class="bubble">Processing...</div>
        </div>
      `);
      box.scrollTop = box.scrollHeight;

      fetch("/get_response", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      })
        .then(res => res.json())
        .then(data => {
          const reply = data.reply || "Neural link failure. Please try again.";
          const botDiv = document.getElementById(botId);
          botDiv.querySelector('.bubble').textContent = reply;
          botDiv.insertAdjacentHTML('beforeend', `
          <div class="action-row">
            <button class="mini-btn spk-btn" onclick="toggleSpeak(this, '${reply.replace(/'/g, "\\'")}')">
              <i class="fas fa-play"></i> Play
            </button>
            <button class="mini-btn" onclick="copyText(this)">
              <i class="fas fa-copy"></i> Copy
            </button>
          </div>
        `);
          box.scrollTop = box.scrollHeight;

          // Auto-play the new response if it's the professional setting
          const newSpk = botDiv.querySelector('.spk-btn');
          toggleSpeak(newSpk, reply);
        });
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => e.key === 'Enter' && sendMessage());

    function startSpeechRecognition() {
      if (!('webkitSpeechRecognition' in window)) return alert("Speech recognition not supported");
      const recognition = new webkitSpeechRecognition();
      const micBtn = document.getElementById('micBtn');

      recognition.onstart = () => micBtn.classList.add('listening');
      recognition.onend = () => micBtn.classList.remove('listening');

      recognition.onresult = (e) => {
        document.getElementById('userInput').value = e.results[0][0].transcript;
        sendMessage();
      };
      recognition.start();
    }

    // Auto-welcome on load
    window.onload = () => {
      setTimeout(() => {
        const firstBtn = document.querySelector('.spk-btn');
        toggleSpeak(firstBtn, 'Greetings! I am your AI Career Buddy. High intelligence mode is active. How can I facilitate your professional growth today?');
      }, 800);
    };
  </script>
</body>

</html>
