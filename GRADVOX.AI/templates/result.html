<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GradVox Result</title>

<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
padding:0;
overflow-x:hidden;
font-family:Arial,sans-serif;
}

/* SCROLL LINE RIGHT (already exists) */
#scrollLine{
position:fixed;
right:8px;
top:0;
width:6px;
height:0%;
background:linear-gradient(180deg,#4CAF50,#00e5ff);
border-radius:4px;
z-index:999;
}

/* CELEBRATION PARTICLES */
.celebrate{
position:fixed;
width:20px;
height:20px;
border-radius:50%;
pointer-events:none;
animation:burst 1.8s ease-out forwards;
}

@keyframes burst{
0%{
transform:translate(0,0) scale(1);
opacity:1;
}
100%{
transform:translate(var(--x),var(--y)) scale(0.3);
opacity:0;
}
}

/* CONTAINER */
.result-container{
width:100%;
max-width:1100px;
margin:auto;
padding:30px;
box-sizing:border-box;
}

/* HEADER */
.score-header{
text-align:center;
margin-bottom:30px;
}

.score-header h1{
font-size:36px;
margin-bottom:10px;
}

.score-number{
font-size:55px;
font-weight:bold;
color:#4CAF50;
}

/* CHART */
.chart-section{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-bottom:30px;
}

.chart-box{
flex:1 1 48%;
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:10px;
height:300px;
}

/* IMPROVE */
.improve-section{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.improve-section ul{
line-height:1.8;
}

.feedback-btn{
text-align:center;
margin-top:20px;
}

.feedback-btn button{
padding:12px 28px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
background:#4CAF50;
color:white;
}

canvas{
width:100% !important;
height:100% !important;
}

/* CUSTOM LEFT SCROLLBAR */
#customScrollBar {
  position: fixed;
  left: 0;
  top: 0;
  width: 12px;
  height: 100%;
  background: rgba(0,0,0,0.05);
  z-index: 999;
  border-radius: 6px;
}

#customThumb {
  position: absolute;
  top: 0;
  left: 0;
  width: 12px;
  height: 80px;
  background: linear-gradient(180deg,#ff4081,#ffeb3b);
  border-radius: 6px;
  cursor: grab;
}

/* === RESPONSIVE === */
@media(max-width:1024px){
  .result-container{padding:24px 20px;}
  .score-header h1{font-size:28px;}
  .score-number{font-size:44px;}
  .chart-box{height:260px;}
}
@media(max-width:768px){
  .chart-section{flex-direction:column;}
  .chart-box{flex:1 1 100%;height:240px;}
  .result-container{padding:20px 14px;}
  .score-header h1{font-size:24px;}
  .score-number{font-size:38px;}
  .improve-section{padding:16px;}
  .feedback-btn button{width:100%;}
}
@media(max-width:480px){
  .score-header h1{font-size:20px;}
  .score-number{font-size:30px;}
  .chart-box{height:200px;}
  .improve-section h2{font-size:18px;}
}

</style>

</head>

<body>

<div id="scrollLine"></div>

<!-- CUSTOM LEFT SCROLLBAR -->
<div id="customScrollBar">
  <div id="customThumb"></div>
</div>

<div class="result-container">

<div class="score-header">
<h1>Your Interview Score</h1>
<div class="score-number">{{score}}%</div>
<p>Domain: <b>{{domain}}</b></p>
</div>

<div class="chart-section">

<div class="chart-box">
<canvas id="barChart"></canvas>
</div>

<div class="chart-box">
<canvas id="lineChart"></canvas>
</div>

</div>

<div class="improve-section">

<h2>Skills To Focus For {{domain}}</h2>

<ul>
{% for skill in domain_skills %}
<li>{{skill}}</li>
{% endfor %}
</ul>

</div>

<div class="feedback-btn">
<a href="/feedback">
<button>Submit GradVox Feedback</button>
</a>
</div>

</div>

<!-- PASS DATA FROM FLASK -->
<script id="resultData" type="application/json">
{
"score": {{score}},
"confidence": {{confidence}},
"clarity": {{clarity}},
"speakingTime": {{speaking_time}},
"answerLength": {{answer_length}}
}
</script>

<script>

/* READ FLASK DATA SAFELY */
const data = JSON.parse(document.getElementById("resultData").textContent);

const score = data.score;
const confidence = data.confidence;
const clarity = data.clarity;
const speakingTime = data.speakingTime;
const answerLength = data.answerLength;

/* SCROLL LINE (RIGHT) */
window.addEventListener("scroll", function(){
    let winScroll = document.documentElement.scrollTop;
    let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    let scrolled = (winScroll / height) * 100;
    document.getElementById("scrollLine").style.height = scrolled + "%";
});

/* CHART DATA */
const labels=["Confidence","Clarity","Answer Length","Speaking Time"];
const values=[confidence,clarity,answerLength,speakingTime];

/* BAR CHART */
new Chart(document.getElementById("barChart"),{
type:"bar",
data:{labels:labels,datasets:[{label:"Interview Analysis",data:values}]},
options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,max:100}}}
});

/* LINE CHART */
new Chart(document.getElementById("lineChart"),{
type:"line",
data:{labels:labels,datasets:[{label:"Performance",data:values,fill:false,tension:0.4}]},
options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,max:100}}}
});

/* SCORE EFFECTS */
function showEffect(){
if(score>=70){
const colors=["#ff5252","#ffeb3b","#40c4ff","#69f0ae","#ff4081","#ffd740"];
for(let i=0;i<120;i++){
let particle=document.createElement("div");
particle.className="celebrate";
particle.style.background=colors[Math.floor(Math.random()*colors.length)];
let startSide=Math.random()>0.5 ? 0 : window.innerWidth;
particle.style.left=startSide+"px";
particle.style.top=Math.random()*window.innerHeight+"px";
let x=(Math.random()*600-300)+"px";
let y=(Math.random()*600-300)+"px";
particle.style.setProperty("--x",x);
particle.style.setProperty("--y",y);
document.body.appendChild(particle);
setTimeout(()=>{particle.remove();},1800);
}}
else if(score>=60){
document.body.style.background="linear-gradient(135deg,#1a237e,#0d47a1)";
}
else if(score<50){
document.body.style.background="linear-gradient(135deg,#4a148c,#880e4f)";
}}
showEffect();

/* ---------------------- */
/* CUSTOM LEFT SCROLLBAR FUNCTIONALITY */
const thumb = document.getElementById("customThumb");
const scrollBar = document.getElementById("customScrollBar");

let isDragging = false;
let startY, startScroll;

function updateThumb() {
    const viewHeight = window.innerHeight;
    const pageHeight = document.documentElement.scrollHeight;
    const thumbHeight = Math.max((viewHeight / pageHeight) * viewHeight, 50);
    thumb.style.height = thumbHeight + "px";
    updateThumbPosition();
}

function updateThumbPosition() {
    const scrollTop = window.scrollY || document.documentElement.scrollTop;
    const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
    const maxTop = window.innerHeight - thumb.offsetHeight;
    thumb.style.top = (scrollTop / scrollHeight) * maxTop + "px";
}

// Drag events
thumb.addEventListener("mousedown", (e) => {
    isDragging = true;
    startY = e.clientY;
    startScroll = window.scrollY || document.documentElement.scrollTop;
    thumb.style.cursor = "grabbing";
    document.body.style.userSelect = "none";
});

window.addEventListener("mousemove", (e) => {
    if(!isDragging) return;
    const deltaY = e.clientY - startY;
    const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
    const maxTop = window.innerHeight - thumb.offsetHeight;
    const scrollDelta = (deltaY / maxTop) * scrollHeight;
    window.scrollTo(0, startScroll + scrollDelta);
});

window.addEventListener("mouseup", () => {
    isDragging = false;
    thumb.style.cursor = "grab";
    document.body.style.userSelect = "auto";
});

window.addEventListener("scroll", updateThumbPosition);
window.addEventListener("resize", updateThumb);

updateThumb();

</script>

</body>
</html>
