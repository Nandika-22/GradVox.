<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identify Yourself | GradVox</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Fredoka:wght@400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --primary: #38bdf8;
      --secondary: #8b5cf6;
      --accent: #fbbf24;
      --text: #f8fafc;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 20px 0;
    }

    /* Lava Lamp Background (Matches Get Started) */
    .lava-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: #020617;
    }

    .blob {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      animation: move 20s infinite alternate ease-in-out;
    }

    .blob-1 {
      background: var(--primary);
      top: -10%;
      left: -5%;
    }

    .blob-2 {
      background: var(--secondary);
      bottom: -10%;
      right: -5%;
      animation-delay: -5s;
    }

    @keyframes move {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(50px, 50px) scale(1.1);
      }
    }

    /* Bouncy Card Interface */
    .fun-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-radius: 60px;
      padding: 60px 40px;
      text-align: center;
      width: 90%;
      max-width: 450px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
      animation: bounceIn 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
      position: relative;
    }

    @keyframes bounceIn {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .avatar-mini-wrap {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      position: relative;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 6px solid var(--bg);
      background: white;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    h2 {
      font-family: 'Fredoka', cursive;
      font-size: clamp(1.8rem, 8vw, 2.2rem);
      margin-bottom: 30px;
      background: linear-gradient(135deg, white, var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    @media (max-width: 480px) {
      .fun-card {
        padding: 50px 25px 40px;
        border-radius: 40px;
      }
      .avatar-mini-wrap {
        width: 100px;
        height: 100px;
      }
      .input-field {
        padding: 15px 20px;
        font-size: 1.1rem;
      }
      .btn-squish {
        padding: 16px;
        font-size: 1.1rem;
      }
    }

    .input-group {
      position: relative;
      margin-bottom: 10px;
    }

    .input-field {
      width: 100%;
      padding: 20px 25px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 25px;
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      outline: none;
      transition: 0.3s;
      text-align: center;
    }

    .input-field:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
      transform: scale(1.02);
    }

    .input-hint {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 30px;
      display: block;
      font-weight: 500;
      opacity: 0.7;
    }

    /* Squishy Button */
    .btn-squish {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      padding: 20px;
      border-radius: 25px;
      font-size: 1.2rem;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 8px 0 #1e40af;
      transition: 0.2s;
    }

    .btn-squish:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 0 #1e40af;
    }

    .btn-squish:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #1e40af;
    }
  </style>
</head>

<body>
  <div class="lava-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <main class="fun-card">
    <div class="avatar-mini-wrap">
      <img src="/static/avatar2.png" class="avatar-img" alt="Mentor">
    </div>

    <h2>Portal Initiation</h2>

    <form action="/name" method="POST">
      <div class="input-group">
        <input type="text" id="nameInput" name="username" class="input-field" placeholder="What should I call you?"
          required autocomplete="off">
      </div>
      <span class="input-hint">Your identifier session starts here ✨</span>

      <button type="submit" class="btn-squish" onclick="save()">Initialize Portal</button>
    </form>
  </main>

  <script src="/static/voice.js"></script>
  <script>
    function save() {
      const name = document.getElementById("nameInput").value;
      if (name) {
        localStorage.setItem("gradvox_name", name);
      }
    }

    window.onload = function () {
      setTimeout(() => {
        if (typeof speak === "function") {
          speak("Please identify yourself to proceed .");
        }
      }, 600);
    }
  </script>
</body>

</html>
