<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome! | GradVox AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Fredoka:wght@400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --primary: #38bdf8;
      --secondary: #8b5cf6;
      --accent: #fbbf24;
      --text: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 20px 0;
    }

    /* Lava-Lamp Ambient Background */
    .lava-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: #020617;
    }

    .blob {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.3;
      animation: move 25s infinite alternate ease-in-out;
    }

    .blob-1 {
      background: var(--primary);
      top: -10%;
      left: -5%;
    }

    .blob-2 {
      background: var(--secondary);
      bottom: -10%;
      right: -5%;
      animation-delay: -5s;
    }

    .blob-3 {
      background: var(--accent);
      top: 40%;
      left: 60%;
      animation-delay: -10s;
    }

    @keyframes move {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(100px, 100px) scale(1.1);
      }
    }

    /* Elastic Morphing Reveal Card */
    .fun-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-radius: 60px;
      padding: 80px 40px 60px;
      text-align: center;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
      position: relative;
      animation: elasticBounce 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
    }

    @keyframes elasticBounce {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Character Entrance (Mentor Jump) */
    .avatar-wrap {
      width: 150px;
      height: 150px;
      margin: 0 auto 30px;
      position: relative;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 8px solid var(--bg);
      background: white;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
      animation: mentorJump 1.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      transform: translateY(-500px);
    }

    @keyframes mentorJump {
      0% {
        transform: translateY(-500px) scaleY(1.3);
      }

      60% {
        transform: translateY(20px) scaleY(0.8);
      }

      80% {
        transform: translateY(-10px) scaleY(1.1);
      }

      100% {
        transform: translateY(0) scaleY(1);
      }
    }

    /* Wiggling HELLO Badge */
    .hello-badge {
      position: absolute;
      top: -10px;
      right: -20px;
      background: var(--accent);
      color: var(--bg);
      padding: 8px 15px;
      border-radius: 20px;
      font-family: 'Fredoka', cursive;
      font-weight: 800;
      font-size: 14px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      animation: wiggle 2s infinite ease-in-out;
    }

    @keyframes wiggle {

      0%,
      100% {
        transform: rotate(-5deg);
      }

      50% {
        transform: rotate(10deg) scale(1.1);
      }
    }

    h1 {
      font-family: 'Fredoka', cursive;
      font-size: clamp(2.5rem, 10vw, 3.5rem);
      margin-bottom: 10px;
      background: linear-gradient(135deg, white, var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    @media (max-width: 480px) {
      .fun-card {
        padding: 60px 25px 40px;
        border-radius: 40px;
      }
      .avatar-wrap {
        width: 120px;
        height: 120px;
      }
      p {
        font-size: 1rem;
        margin-bottom: 30px;
      }
      .btn-squish {
        padding: 18px 30px;
        font-size: 1.2rem;
      }
    }

    p {
      color: #94a3b8;
      font-size: 1.1rem;
      margin-bottom: 40px;
      font-weight: 500;
      line-height: 1.6;
    }

    /* Tactile Squishy Button */
    .btn-squish {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      padding: 22px 50px;
      border-radius: 30px;
      font-size: 1.4rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 10px 0 #1e40af;
      transition: 0.2s;
      width: 100%;
    }

    .btn-squish:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 0 #1e40af;
      filter: brightness(1.1);
    }

    .btn-squish:active {
      transform: translateY(6px);
      box-shadow: 0 4px 0 #1e40af;
    }

    /* Pop Out Transition Overlay */
    .pop-out {
      position: fixed;
      inset: 0;
      background: white;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: 0.5s;
    }

    .pop-active .pop-out {
      opacity: 1;
      transform: scale(2);
    }
  </style>
</head>

<body id="mainBody">
  <div class="pop-out"></div>

  <div class="lava-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="fun-card" id="startCard">
    <div class="avatar-wrap">
      <div class="hello-badge">HELLO! 👋</div>
      <img src="/static/avatar2.png" class="avatar-img" alt="AI Mentor">
    </div>

    <h1>GradVox</h1>
    <p>The ultimate career intelligence hub. Are you ready to level up your career game?</p>

    <button class="btn-squish" onclick="startSequence()">Let's Go!</button>
  </main>

  <script src="/static/voice.js"></script>
  <script>
    function startSequence() {
      // Pop Out effect
      document.getElementById('mainBody').classList.add('pop-active');
      document.getElementById('startCard').style.transition = '0.5s';
      document.getElementById('startCard').style.transform = 'scale(1.5) rotate(5deg)';
      document.getElementById('startCard').style.filter = 'blur(10px)';
      document.getElementById('startCard').style.opacity = '0';

      setTimeout(() => {
        location.href = '/name';
      }, 500);
    }

    window.onload = function () {
      setTimeout(() => {
        if (typeof speak === "function") {
          speak("Welcome to Grad Vox. I'm here to help you crack your dream job!");
        }
      }, 1000);
    };
  </script>

  </script>
</body>

</html>
